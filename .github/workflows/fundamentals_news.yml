name: fundamentals-and-news

on:
  schedule:
    # Financials: 4:30 PM IST = 11:00 UTC (daily, not conflicting with anything)
    - cron: "0 11 * * 1-5"
    # News: 3 min AFTER intraday_live to avoid push conflicts on same repo
    # intraday_live fires at :45 and :30 — news fires at :48 and :35
    - cron: "48 3  * * 1-5"   # 09:18 IST (intraday fires 09:15)
    - cron: "35 4  * * 1-5"   # 10:05 IST (intraday fires 10:00)
    - cron: "35 5  * * 1-5"   # 11:05 IST
    - cron: "35 6  * * 1-5"   # 12:05 IST
    - cron: "35 7  * * 1-5"   # 13:05 IST
    - cron: "35 8  * * 1-5"   # 14:05 IST
    - cron: "35 9  * * 1-5"   # 15:05 IST
    - cron: "3  10 * * 1-5"   # 15:33 IST (intraday fires 15:30)
    - cron: "30 12 * * 1-5"   # 18:00 IST EOD
  workflow_dispatch:

jobs:
  # ── Financials: runs only at 4:30 PM IST ────────────────────────────────────
  fetch-financials:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 11 * * 1-5'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4 lxml

      - name: Fetch financials (incremental — only unfetched symbols today)
        run: python scripts/fetch_financials.py

      - name: Commit and push (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/financials/
          if git diff --staged --quiet; then
            echo "Nothing new to commit"
            exit 0
          fi
          git stash
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git stash pop 2>/dev/null || true
            git add data/financials/
            git diff --staged --quiet && echo "Nothing after rebase" && exit 0
            git commit -m "Financials $(date +'%Y-%m-%d')" 2>/dev/null || true
            git push origin main && echo "✓ Push OK on attempt $i" && exit 0
            echo "Attempt $i failed — retrying in $((i*15))s"
            git stash 2>/dev/null || true
            sleep $((i * 15))
          done
          echo "All push attempts failed" && exit 1

  # ── News: runs at all other times (hourly) ───────────────────────────────────
  # Uses needs: so on the 4:30 PM trigger it waits for financials to finish first
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [fetch-financials]
    if: >
      always() && (
        github.event_name == 'workflow_dispatch' ||
        github.event.schedule != '0 11 * * 1-5'
      )

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install nse httpx[http2] requests

      - name: Fetch news (incremental — only new announcement IDs)
        run: python scripts/fetch_news.py

      - name: Commit and push (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news/
          if git diff --staged --quiet; then
            echo "No new announcements this run"
            exit 0
          fi
          git stash
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git stash pop 2>/dev/null || true
            git add data/news/
            git diff --staged --quiet && echo "Nothing after rebase" && exit 0
            git commit -m "News +$(python3 -c "import json; d=json.load(open('data/news/news.json')); print(d.get('new_this_run',0))" 2>/dev/null || echo '?') $(date +'%H:%M')" 2>/dev/null || true
            git push origin main && echo "✓ Push OK on attempt $i" && exit 0
            echo "Attempt $i failed — retrying in $((i*15))s"
            git stash 2>/dev/null || true
            sleep $((i * 15))
          done
          echo "All push attempts failed" && exit 1
