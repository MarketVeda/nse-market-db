name: nightly-nse-fetch

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-nse-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyintegrate requests

      - name: Fetch EOD OHLCV data
        env:
          DEFINEDGE_API_TOKEN: ${{ secrets.DEFINEDGE_API_TOKEN }}
          DEFINEDGE_API_SECRET: ${{ secrets.DEFINEDGE_API_SECRET }}
        run: python scripts/fetch_eod.py

      - name: Fetch F&O OI data
        env:
          DEFINEDGE_API_TOKEN: ${{ secrets.DEFINEDGE_API_TOKEN }}
          DEFINEDGE_API_SECRET: ${{ secrets.DEFINEDGE_API_SECRET }}
        run: python scripts/fetch_fno_oi.py

      - name: Fetch NSE delivery data
        run: python scripts/fetch_delivery.py

      - name: Commit and push new data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "NSE data ${DATE}"
            git push
          fi
