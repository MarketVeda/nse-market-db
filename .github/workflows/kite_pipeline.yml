name: kite-market-pipeline

on:
  schedule:
    # 4:00 PM IST = 10:30 UTC  (Mon–Fri)
    - cron: "30 10 * * 1-5"
  workflow_dispatch:   # manual trigger from Actions tab

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kiteconnect pyotp requests

      - name: Fetch EOD OHLCV (500 symbols, ~3 min)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_eod.py

      - name: Fetch Intraday candles (211 FnO symbols, ~4 min)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_intraday.py

      - name: Fetch F&O OI + Delivery data
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_fno_delivery.py

      - name: Commit and push all data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit (market holiday?)"
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "NSE market data ${DATE}"
            git push
            echo "Data committed and pushed for ${DATE}"
          fi

      - name: Pipeline Summary
        if: always()
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "===== Pipeline Summary: ${DATE} ====="
          for f in data/daily/${DATE}.json data/intraday/${DATE}.json data/fno_oi/${DATE}.json data/delivery/${DATE}.json; do
            if [ -f "$f" ]; then
              N=$(python3 -c "import json; print(len(json.load(open('$f')).get('symbols',{})))" 2>/dev/null || echo "?")
              echo "  OK  $f  [${N} symbols]"
            else
              echo "  MISSING  $f"
            fi
          done
          echo "====================================="
