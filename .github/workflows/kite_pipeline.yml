name: kite-market-pipeline

on:
  schedule:
    # 4:00 PM IST = 10:30 UTC (Mon–Fri)
    - cron: "30 10 * * 1-5"
  workflow_dispatch:

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kiteconnect pyotp requests

      - name: Fetch EOD OHLCV — 500 symbols, ~3 min (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_eod.py

      - name: Fetch Intraday candles — 211 FnO, ~4 min (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_intraday.py

      - name: Fetch F&O OI + Delivery (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_fno_delivery.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes (market holiday or all already fetched)"
          else
            for i in 1 2 3; do
              git pull --rebase origin main && break || sleep 5
            done
            git commit -m "NSE EOD + Intraday $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "===== Pipeline Summary: ${DATE} ====="
          for f in data/daily/${DATE}.json data/intraday/${DATE}.json \
                   data/fno_oi/${DATE}.json data/delivery/${DATE}.json; do
            if [ -f "$f" ]; then
              N=$(python3 -c "import json; d=json.load(open('$f')); print(len(d.get('symbols',{})))" 2>/dev/null || echo "?")
              echo "  OK  $(basename $f)  [${N} symbols]"
            else
              echo "  MISSING  $(basename $f)"
            fi
          done
          echo "  Repo data size: $(du -sh data/ 2>/dev/null | cut -f1)"
          echo "====================================="
