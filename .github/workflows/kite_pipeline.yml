name: kite-market-pipeline

on:
  schedule:
    - cron: "30 10 * * 1-5"   # 4:00 PM IST exactly
  workflow_dispatch:

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install --upgrade pip && pip install kiteconnect pyotp requests

      - name: Fetch EOD OHLCV (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_eod.py

      - name: Fetch Intraday candles (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_intraday.py

      - name: Fetch FnO OI + Delivery (skips if already done today)
        env:
          KITE_API_KEY:     ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:  ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID:     ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD:    ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python scripts/fetch_fno_delivery.py

      - name: Commit and push (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit"
            exit 0
          fi
          # Stash → fetch latest → rebase → pop → commit → push (retry 5x)
          git stash
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git stash pop 2>/dev/null || true
            git add data/
            git diff --staged --quiet && echo "Nothing after rebase" && exit 0
            git commit -m "NSE data $(date +'%Y-%m-%d')" 2>/dev/null || true
            git push origin main && echo "✓ Push OK on attempt $i" && exit 0
            echo "Attempt $i failed — retrying in $((i*15))s"
            git stash 2>/dev/null || true
            sleep $((i * 15))
          done
          echo "All push attempts failed" && exit 1

      - name: Summary
        if: always()
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "=== Pipeline Summary ${DATE} ==="
          for f in data/daily/${DATE}.json data/intraday/${DATE}.json \
                   data/fno_oi/${DATE}.json data/delivery/${DATE}.json; do
            [ -f "$f" ] && echo "  ✓ $f" || echo "  ✗ $f MISSING"
          done
          echo "  Repo size: $(du -sh data/ 2>/dev/null | cut -f1)"
