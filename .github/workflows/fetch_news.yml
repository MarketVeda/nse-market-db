name: fetch-news

on:
  schedule:
    # Every hour during + after market hours (IST)
    # Staggered 3 min after intraday_live to avoid push conflicts
    - cron: "48 3  * * 1-5"   # 09:18 IST
    - cron: "35 4  * * 1-5"   # 10:05 IST
    - cron: "35 5  * * 1-5"   # 11:05 IST
    - cron: "35 6  * * 1-5"   # 12:05 IST
    - cron: "35 7  * * 1-5"   # 13:05 IST
    - cron: "35 8  * * 1-5"   # 14:05 IST
    - cron: "35 9  * * 1-5"   # 15:05 IST
    - cron: "3  10 * * 1-5"   # 15:33 IST
    - cron: "30 12 * * 1-5"   # 18:00 IST EOD
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install nse httpx[http2] requests

      - name: Fetch NSE announcements (incremental — only new IDs)
        run: python scripts/fetch_news.py

      - name: Commit and push (with retry)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news/
          if git diff --staged --quiet; then
            echo "No new announcements"
            exit 0
          fi
          git stash
          for i in 1 2 3 4 5; do
            git fetch origin main
            git rebase origin/main
            git stash pop 2>/dev/null || true
            git add data/news/
            git diff --staged --quiet && echo "Nothing after rebase" && exit 0
            git commit -m "News $(date +'%Y-%m-%d %H:%M')" 2>/dev/null || true
            git push origin main && echo "Push OK on attempt $i" && exit 0
            echo "Attempt $i failed — retrying in $((i*15))s"
            git stash 2>/dev/null || true
            sleep $((i * 15))
          done
          exit 1
